# Site settings
title: Liuaj's Blog
subtitle: 学会积累，厚积薄发
description: 一个专注于技术分享的博客，涵盖 AI、后端开发、嵌入式等领域
author: Liuaj
email: aijia930515@163.com
url: https://Liu-aj.github.io
baseurl: ""

# Social links
github: Laijia
github_repo: https://github.com/Laijia/Liu-aj.github.io
resume_site: https://github.com/Laijia

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Liuaj"

# Collections (专题系列)
collections:
  series:
    output: true
    permalink: /series/:path/

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - README.md
  - LICENSE
  - _deploy
  - _drafts

# Keep files
keep_files:
  - .git
  - CNAME

# Timezone
timezone: Asia/Shanghai
lang: zh-CN

# SEO
meta_description: Liuaj;个人博客;学而不思则罔;思而不学则殆;生命不止;折腾不休
motto: 尝试总结分类
banner: 学而不思则罔，思而不学则殆。

# Analytics
baidu_analysis: 7501fa07838ede8c526fafa847ec5665

# Categories
categories: ['Java','DB','Linux','AI','Workflow','Tools','Other']